spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# AI Configuration
#ai.provider=openrouter
#ai.model=qwen/qwen3-next-80b-a3b-instruct:free
#ai.base-url=https://openrouter.ai/api/v1
#ai.api-key=<OPENROUTER_API_KEY >
#ai.temperature=0.2

# Optional
spring.jackson.serialization.indent_output=true

# ==========================
# AI Configuration
# ==========================

ai.provider=${AI_PROVIDER:groq}
ai.base-url=${AI_BASE_URL:https://api.groq.com/openai/v1}
ai.api-key=${AI_API_KEY}
ai.model=${AI_MODEL:llama-3.3-70b-versatile}
ai.temperature=${AI_TEMPERATURE:0.2}

# ==========================
# MongoDB
# ==========================

spring.data.mongodb.uri=${MONGODB_URI}

# ==========================
# Server
# ==========================

server.port=${PORT:8080}

logging.level.root=INFO
logging.level.org.springframework.web=INFO

server.error.include-message=always
server.error.include-binding-errors=always

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.frontend.url=${APP_FRONTEND_URL:https://intelligent-perception-production-f1bc.up.railway.app}

# ==========================
# Google OAuth
# ==========================

google.client.id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}