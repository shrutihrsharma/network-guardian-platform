spring.application.name=backend
spring.config.import=optional:file:.env.properties

# AI Configuration
#ai.provider=openrouter
#ai.model=qwen/qwen3-next-80b-a3b-instruct:free
#ai.base-url=https://openrouter.ai/api/v1
#ai.api-key=<OPENROUTER_API_KEY >
#ai.temperature=0.2

# Optional
spring.jackson.serialization.indent_output=true

# ==========================
# AI Configuration
# ==========================

ai.provider=${AI_PROVIDER:vertex}
ai.model=${AI_MODEL:gemini-1.5-flash-001}
gcp.project-id=${GCP_PROJECT_ID}
gcp.location=${GCP_LOCATION:us-central1}

# Legacy properties for other AI clients
ai.base-url=${AI_BASE_URL:none}
ai.api-key=${AI_API_KEY:none}
ai.temperature=${AI_TEMPERATURE:0.2}

rag.embedding.model=${RAG_EMBEDDING_MODEL:text-embedding-004}
rag.incident.top-k=${RAG_INCIDENT_TOP_K:5}

# ==========================
# MongoDB
# ==========================

spring.data.mongodb.uri=${MONGODB_URI}

# ==========================
# Server
# ==========================

server.port=${PORT:8080}

logging.level.root=INFO
logging.level.org.springframework.web=INFO

server.error.include-message=always
server.error.include-binding-errors=always

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.frontend.url=${APP_FRONTEND_URL:https://intelligent-perception-production-f1bc.up.railway.app}